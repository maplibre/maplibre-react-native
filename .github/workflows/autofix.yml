name: autofix.ci
on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    branches:
      - main
      - beta
      - alpha
  merge_group:
    types:
      - checks_requested
permissions:
  contents: read

jobs:
  autofix:
    name: autofix.ci
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Setup Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Codegen
        run: yarn codegen

      - name: Format with  ESLint
        run: yarn lint:eslint:fix

      - name: Format with  Prettier
        run: yarn format:prettier

      - name: Install native formatters
        run: brew install clang-format ktlint

      - name: Format with ClangFormat
        run: yarn package format:clang-format

      - name: Format with Ktlint
        run: yarn package format:ktlint

      - name: autofix.ci
        uses: autofix-ci/action@c5b2d67aa2274e7b5a18224e8171550871fc7e4a
        with:
          commit-message: "style: apply automated fixes"
